services:
  db:
    container_name: vuejs-csharp-db
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: crudapp
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3308:3306" # Expose MySQL on 3308 to avoid conflicts with local MySQL

  adminer:
    container_name: vuejs-csharp-adminer
    image: adminer:latest
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8081:8080"

  api:
    container_name: vuejs-csharp-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION_STRING: server=db;port=3306;database=crudapp;user=root;password=secret
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: dev-only-secret-change-me
    # Internal port only, accessed via nginx
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # Nginx reverse proxy for API (HTTP localhost)
  api-nginx:
    container_name: vuejs-csharp-api-nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile.api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  client:
    container_name: vuejs-csharp-client
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      api-nginx:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  dbdata:


