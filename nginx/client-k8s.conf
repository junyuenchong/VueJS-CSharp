# HTTP server for Kubernetes (no SSL needed - using NodePort)
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html; # Where Vue.js built files are located
    index index.html; # Default file to serve

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Vue.js SPA routing - if file not found, serve index.html (for client-side routing)
    location / {
        try_files $uri $uri/ /index.html; # Try to serve file, if not found serve index.html
    }

    # Cache static files (JS, CSS, images) for 1 year (they have hash in filename)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y; # Browser caches for 1 year
        add_header Cache-Control "public, immutable"; # Can't change, safe to cache
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n"; # Return "healthy" status
        add_header Content-Type text/plain;
    }
}

