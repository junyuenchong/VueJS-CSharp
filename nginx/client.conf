# ============================================================================
# Client Nginx Configuration - Business Best Practices
# ============================================================================
# Production-ready static file server with enhanced security,
# performance optimizations, and SSL/TLS best practices
# ============================================================================

# Rate limiting zones for DDoS protection
limit_req_zone $binary_remote_addr zone=client_limit:10m rate=200r/m;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# HTTPS server block for Vue.js client - serves static files with HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;  # IPv6 support
    server_name localhost;

    root /usr/share/nginx/html;  # Where Vue.js built files are located
    index index.html;  # Default file to serve

    # ========================================================================
    # SSL/TLS Configuration - Modern Best Practices (Mozilla Intermediate)
    # ========================================================================
    
    # SSL certificate files
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Only allow modern, secure TLS versions
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Modern cipher suite - prioritize TLS 1.3, then strong TLS 1.2 ciphers
    # Compatible with modern browsers while maintaining security
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;  # TLS 1.3 handles cipher selection
    
    # SSL session configuration for performance
    ssl_session_cache shared:SSL:10m;  # Cache 10MB of SSL sessions
    ssl_session_timeout 1d;  # Session timeout: 1 day
    ssl_session_tickets off;  # Disable TLS session tickets for security
    
    # OCSP stapling - improves SSL performance and security
    # Note: Requires valid CA-signed certificate (not self-signed)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    
    # Diffie-Hellman parameters for perfect forward secrecy (PFS)
    # Generate with: openssl dhparam -out dhparam.pem 2048
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    
    # ========================================================================
    # Security Headers - OWASP Best Practices
    # ========================================================================
    
    # HSTS - Force HTTPS for 1 year, include subdomains, allow preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection (legacy, but still supported by older browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy - adjust based on your frontend needs
    # This is a relaxed CSP for Vue.js - tighten based on your requirements
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://localhost:8443; frame-ancestors 'self';" always;
    
    # Referrer Policy - control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (formerly Feature-Policy) - restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), speaker=()" always;
    
    # Remove server version for security (hide nginx version)
    server_tokens off;
    
    # ========================================================================
    # Performance & Connection Settings
    # ========================================================================
    
    # Buffer sizes for better performance
    client_body_buffer_size 128k;
    client_max_body_size 10m;  # Maximum upload size
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # Connection limits per IP
    limit_conn conn_limit_per_ip 20;
    
    # Enable sendfile for better performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # ========================================================================
    # Logging Configuration
    # ========================================================================
    
    # Access log format with more details
    log_format client_access '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             '$request_time';
    
    access_log /var/log/nginx/client_access.log client_access;
    error_log /var/log/nginx/client_error.log warn;
    
    # ========================================================================
    # Gzip Compression - Performance Optimization
    # ========================================================================
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;  # Compression level (1-9, 6 is a good balance)
    gzip_min_length 1000;  # Only compress files larger than 1KB
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype
        application/x-font-opentype
        application/x-font-truetype
        application/font-woff
        application/font-woff2;
    
    # Disable gzip for old browsers
    gzip_disable "msie6";
    
    # ========================================================================
    # Static File Caching & Optimization
    # ========================================================================
    
    # Cache static assets for 1 year (they have hash in filename, so safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;  # Don't log static file requests
        add_header Vary "Accept-Encoding";
    }
    
    # Cache HTML files for a shorter period (1 hour)
    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Vary "Accept-Encoding";
    }
    
    # ========================================================================
    # Health Check Endpoint (No Rate Limiting)
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ========================================================================
    # Vue.js SPA Routing - Handle Client-Side Routes
    # ========================================================================
    
    location / {
        # Rate limiting - protect against DDoS
        limit_req zone=client_limit burst=50 nodelay;
        
        # Try to serve file, if not found serve index.html (for SPA routing)
        try_files $uri $uri/ /index.html;
        
        # Security headers for HTML files
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        
        # Don't cache index.html (SPA entry point)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
    
    # ========================================================================
    # Block Access to Hidden Files
    # ========================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ========================================================================
    # Block Access to Sensitive Files
    # ========================================================================
    
    location ~* \.(git|svn|env|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================================
# HTTP to HTTPS Redirect
# ============================================================================
# Redirect all HTTP traffic to HTTPS (security best practice)
server {
    listen 80;
    listen [::]:80;  # IPv6 support
    server_name localhost;
    
    # Hide server version
    server_tokens off;
    
    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
