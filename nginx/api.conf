# ============================================================================
# API Nginx Configuration - Business Best Practices
# ============================================================================
# Production-ready reverse proxy configuration with enhanced security,
# performance optimizations, and SSL/TLS best practices
# ============================================================================

# Rate limiting zones for DDoS protection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=50r/s;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# WebSocket connection mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTPS server block for API - listens on port 443 (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;  # IPv6 support
    server_name localhost;

    # ========================================================================
    # SSL/TLS Configuration - Modern Best Practices (Mozilla Intermediate)
    # ========================================================================
    
    # SSL certificate files
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Only allow modern, secure TLS versions
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Modern cipher suite - prioritize TLS 1.3, then strong TLS 1.2 ciphers
    # Compatible with modern browsers while maintaining security
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;  # TLS 1.3 handles cipher selection
    
    # SSL session configuration for performance
    ssl_session_cache shared:SSL:10m;  # Cache 10MB of SSL sessions
    ssl_session_timeout 1d;  # Session timeout: 1 day
    ssl_session_tickets off;  # Disable TLS session tickets for security
    
    # OCSP stapling - improves SSL performance and security
    # Note: Requires valid CA-signed certificate (not self-signed)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    
    # Diffie-Hellman parameters for perfect forward secrecy (PFS)
    # Generate with: openssl dhparam -out dhparam.pem 2048
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    
    # ========================================================================
    # Security Headers - OWASP Best Practices
    # ========================================================================
    
    # HSTS - Force HTTPS for 1 year, include subdomains, allow preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection (legacy, but still supported by older browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy - restrict resource loading
    # Adjust based on your API needs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # Referrer Policy - control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (formerly Feature-Policy) - restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), speaker=()" always;
    
    # Remove server version for security (hide nginx version)
    server_tokens off;
    
    # ========================================================================
    # Performance & Connection Settings
    # ========================================================================
    
    # Buffer sizes for better performance
    client_body_buffer_size 128k;
    client_max_body_size 10m;  # Maximum upload size
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # Connection limits per IP
    limit_conn conn_limit_per_ip 20;
    
    # Enable sendfile for better performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # ========================================================================
    # Logging Configuration
    # ========================================================================
    
    # Access log format with more details
    log_format api_access '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         '$request_time $upstream_response_time';
    
    access_log /var/log/nginx/api_access.log api_access;
    error_log /var/log/nginx/api_error.log warn;
    
    # ========================================================================
    # Health Check Endpoint (No Rate Limiting)
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ========================================================================
    # API Proxy Configuration
    # ========================================================================
    
    location / {
        # Rate limiting - protect against DDoS and brute force
        limit_req zone=api_limit burst=20 nodelay;
        limit_req zone=api_burst burst=100 nodelay;
        
        # Proxy settings
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cache control headers
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        
        # Buffer settings for proxy
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Timeouts for backend communication
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Don't pass request body if not needed (GET requests)
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
}

# ============================================================================
# HTTP to HTTPS Redirect
# ============================================================================
# Redirect all HTTP traffic to HTTPS (security best practice)
server {
    listen 80;
    listen [::]:80;  # IPv6 support
    server_name localhost;
    
    # Hide server version
    server_tokens off;
    
    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
