# ============================================================================
# API Nginx Configuration - Business Best Practices
# ============================================================================
# Production-ready reverse proxy configuration with enhanced security,
# performance optimizations, and SSL/TLS best practices
# ============================================================================

# Rate limiting zones for DDoS protection
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=50r/s;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# WebSocket connection mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTP server block for API - listens on port 80
server {
    listen 80;
    listen [::]:80;  # IPv6 support
    server_name localhost;
    
    # ========================================================================
    # Security Headers - OWASP Best Practices
    # ========================================================================
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection (legacy, but still supported by older browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy - restrict resource loading
    # Adjust based on your API needs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # Referrer Policy - control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (formerly Feature-Policy) - restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), speaker=()" always;
    
    # Remove server version for security (hide nginx version)
    server_tokens off;
    
    # ========================================================================
    # Performance & Connection Settings
    # ========================================================================
    
    # Buffer sizes for better performance
    client_body_buffer_size 128k;
    client_max_body_size 10m;  # Maximum upload size
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # Connection limits per IP
    limit_conn conn_limit_per_ip 20;
    
    # Enable sendfile for better performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # ========================================================================
    # Logging (custom log_format must live in http{}, not server{})
    # ========================================================================
    
    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log warn;
    
    # ========================================================================
    # Health Check Endpoint (No Rate Limiting)
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ========================================================================
    # API Proxy Configuration
    # ========================================================================
    
    location / {
        # Rate limiting - protect against DDoS and brute force
        limit_req zone=api_limit burst=20 nodelay;
        limit_req zone=api_burst burst=100 nodelay;
        
        # Proxy settings
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cache control headers
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        
        # Buffer settings for proxy
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Timeouts for backend communication
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Don't pass request body if not needed (GET requests)
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
}
